# Each [[link]] creates a symlink from <repo>/src → dest.
# Scripts in bin/ read this file. Parser is a simple awk — keep entries flat.

[[link]]
src  = "shell/zshrc"
dest = "~/.zshrc"

[[link]]
src  = "tmux/tmux.conf"
dest = "~/.tmux.conf"

[[link]]
src  = "nvim"
dest = "~/.config/nvim"

[[link]]
src  = "git/gitconfig"
dest = "~/.gitconfig"

[[link]]
src  = "claude/settings.json"
dest = "~/.claude/settings.json"

[[link]]
src  = "claude/CLAUDE.md"
dest = "~/.claude/CLAUDE.md"

[[link]]
src  = "claude/commands"
dest = "~/.claude/commands"

[[link]]
src  = "claude/hooks"
dest = "~/.claude/hooks"

[[link]]
src  = "claude/agents-library"
dest = "~/.claude/agents-library"

[[link]]
src  = "claude/mcp-library"
dest = "~/.claude/mcp-library"

[[link]]
src  = "claude/mcp-wrappers"
dest = "~/.claude/mcp-wrappers"

[[link]]
src  = "claude/output-styles"
dest = "~/.claude/output-styles"

[[link]]
src  = "claude/file-templates"
dest = "~/.claude/file-templates"

[[link]]
src  = "claude/skills"
dest = "~/.claude/skills"

[[link]]
src  = "claude/context"
dest = "~/.claude/context"

[[link]]
src  = "shell/completions"
dest = "~/.zsh/completions"

[[link]]
src  = "git/hooks"
dest = "~/.config/git/hooks"

[[link]]
src  = "ghostty/config"
dest = "~/.config/ghostty/config"

[[link]]
src  = "launchd/com.zachkysar.tmp-sweep.plist"
dest = "~/Library/LaunchAgents/com.zachkysar.tmp-sweep.plist"

[[link]]
src  = "tmp/CLAUDE.md"
dest = "~/tmp/CLAUDE.md"

[[link]]
src  = "launchd/com.zachkysar.jpr-pipeline.plist"
dest = "~/Library/LaunchAgents/com.zachkysar.jpr-pipeline.plist"

# External project repos (cloned by bin/bootstrap, linked here).
# src may be ~/-rooted or absolute; bin/link handles both.

[[project]]
repo = "git@github.com:zachkysar/dji-import.git"
path = "~/projects/utils/dji-import"

[[link]]
src  = "~/projects/utils/dji-import/dji-import"
dest = "~/.local/bin/dji-import"

[[link]]
src  = "~/projects/utils/dji-import/completions/_dji-import"
dest = "~/.zsh/external-completions/_dji-import"
